version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olx-tracker-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - olx-network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: olx-tracker-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - olx-network

  mysql:
    image: mysql:8.0
    container_name: olx-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: olx_tracker
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - olx-network

  redis:
    image: redis:alpine
    container_name: olx-tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - olx-network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olx-tracker-queue
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - olx-network

volumes:
  mysql_data:

networks:
  olx-network:
    driver: bridge
