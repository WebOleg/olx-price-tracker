version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olx-price-tracker
    ports:
      - "8080:80"
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=noreply@olx-tracker.local
      - MAIL_FROM_NAME="OLX Price Tracker"
      - QUEUE_CONNECTION=database
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
    depends_on:
      - mailpit
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: olx-mailpit
    ports:
      - "8025:8025"  # Веб-інтерфейс для перегляду пошти
      - "1025:1025"  # SMTP сервер
    restart: unless-stopped

volumes:
  app_storage:
    driver: local
