
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olx-tracker-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - olx-tracker
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: olx-tracker-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: olx_tracker
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - olx-tracker

  redis:
    image: redis:7.0-alpine
    container_name: olx-tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - olx-tracker

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olx-tracker-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - olx-tracker

networks:
  olx-tracker:
    driver: bridge

volumes:
  mysql_data:
    driver: local
